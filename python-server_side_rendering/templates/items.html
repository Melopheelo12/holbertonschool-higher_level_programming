<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Items List</title>
</head>
<body>
    <h1>Items List</h1>

    {# On vérifie si la liste contient des éléments #}
    {% if items %}
        <ul>
            {# On boucle sur chaque élément de la liste #}
            {% for item in items %}
                <li>{{ item }}</li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No items found.</p>
    {% endif %}

</body>
</html>
